events {}

http {
    upstream ginla-api {
        server ginla-api:8080;
    }

    # api.ginla.test → ginla-api
    server {
        listen 80;
        server_name api.ginla.test;

        location / {
            proxy_pass http://ginla-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    upstream ginla-app {
        server ginla-app:3000;
    }

    # admin.ginla.test → ginla-app
    server {
        listen 80;
        server_name admin.ginla.test;

        location / {
            proxy_pass http://ginla-app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Default: 404 for unrecognised hosts
    server {
        listen 80 default_server;

        location / {
            return 404;
        }
    }
}
