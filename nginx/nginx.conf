events {}

http {
    upstream ginla-api {
        server ginla-api:8080;
    }

    # api.ginla.test → ginla-api
    server {
        listen 80;
        server_name api.ginla.test;

        location / {
            proxy_pass http://ginla-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # admin.ginla.test → placeholder 502 (ginla-app not yet built)
    server {
        listen 80;
        server_name admin.ginla.test;

        location / {
            return 502 "Admin UI not yet built\n";
        }
    }

    # Default: 404 for unrecognised hosts
    server {
        listen 80 default_server;

        location / {
            return 404;
        }
    }
}
